<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>血战到底 · XueZhan Mahjong</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<link rel="stylesheet" href="style.css">

<!-- PWA / "Add to Home Screen" -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#155234">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="血战到底">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>
<div id="bootSplash">
  <div class="spinner"></div>
  <div id="bootText">加载中…</div>
  <div style="font-size:12.5px; opacity:.75; max-width:320px">首次打开需要下载 Python 运行时（约 15-20 MB，建议 WiFi），之后可离线游玩</div>
</div>

<header>
  <h1>血战到底</h1>
  <label>对手:
    <select id="aiSel">
      <option value="initial">初始策略 (7attr)</option>
      <option value="advanced">高级策略 (strategyz)</option>
      <option value="defensive">防守策略 (strategyz+防点炮)</option>
    </select></label>
  <label>速度:
    <select id="speedSel">
      <option value="10000">很慢 (10秒/步)</option>
      <option value="5000" selected>慢 (5秒/步)</option>
      <option value="1000">正常</option>
      <option value="300">快</option>
      <option value="0">即时</option>
    </select></label>
  <span class="spacer"></span>
  <span id="dfncyBox" class="badge"></span>
  <button id="hintBtn" class="secondary">提示 Hint</button>
  <button id="dailyBtn" class="secondary">每日挑战</button>
  <button id="newBtn">新开一局 New game</button>
</header>

<div id="layout">
  <div id="tableArea">
    <div class="seat" id="seat2"></div>
    <div class="seat" id="seat3"></div>
    <div id="center">
      <div id="nowBar"></div>
      <div id="wall"></div>
      <div id="discards"></div>
    </div>
    <div class="seat" id="seat1"></div>
    <div class="seat" id="seat0">
      <div class="name" id="myName"></div>
      <div class="tilerow" id="myPile"></div>
      <div id="myhand"></div>
      <div id="actionbar"><span id="prompt"></span><span id="buttons"></span></div>
      <div id="hintPanel"></div>
      <div id="hintDetail"></div>
    </div>
  </div>
  <div id="log"></div>
</div>

<div class="overlay hidden" id="daqueOverlay">
  <div class="panel">
    <h2>定缺 — 选择一门要打缺的花色</h2>
    <p style="font-size:13.5px; opacity:.85">整局中你必须先打光这门花色，胡牌时手中不能有它。</p>
    <div class="row" id="daqueButtons"></div>
    <p id="daqueHint" style="font-size:13px; color:#ffd964"></p>
  </div>
</div>

<div class="overlay hidden" id="overOverlay">
  <div class="panel wide">
    <h2>本局结束</h2>
    <div id="finalScores"></div>
    <div id="settleBox"></div>
    <div id="reviewBox"></div>
    <div class="row"><button onclick="newGame()">再来一局</button>
    <button class="secondary" onclick="document.getElementById('overOverlay').classList.add('hidden')">看牌桌</button></div>
  </div>
</div>

<script src="transport_pyodide.js"></script>
<script src="game.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed', err));
  });
}
</script>
</body>
</html>
